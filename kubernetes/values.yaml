components:
  checkout:
    imageOverride:
      repository: sherlocksai/otel-demo-checkout
      tag: latest
      pullPolicy: Always
  product-catalog:
    imageOverride:
      repository: sherlocksai/otel-demo-product-catalog
      tag: latest
      pullPolicy: Always
    resources:
      limits:
        memory: 250Mi
      requests:
        memory: 100Mi
        cpu: 20m
  load-generator:
    imageOverride:
      repository: sherlocksai/otel-demo-load-generator
      tag: latest
      pullPolicy: Always

prometheus:
  server:
    resources:
      requests:
        memory: "512Mi"
        cpu: "500m"
      limits:
        memory: "1Gi"
        cpu: "1"
    serverFiles:
      prometheus.yml:
        global:
          scrape_interval: 15s
          evaluation_interval: 15s
    persistentVolume:
      enabled: true
      size: 10Gi
      storageClass: gp2
      mountPath: /data
      subPath: ""
    emptyDir: {}
    configMapOverrideName: ""
    configFromSecret: ""
    storage:
      volumeClaimTemplate:
        metadata:
          labels:
            app.kubernetes.io/component: server
            app.kubernetes.io/instance: my-otel-demo
            app.kubernetes.io/name: prometheus
            app.kubernetes.io/part-of: prometheus
            app.kubernetes.io/version: v3.1.0
            helm.sh/chart: prometheus-27.4.0
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi
          storageClassName: gp2
          volumeMode: Filesystem
    extraConfigmapMounts: []
    extraSecretMounts: []
    extraHostPathMounts: []

opentelemetry-collector:
  enabled: true
  image:
    repository: "otel/opentelemetry-collector-contrib"
  fullnameOverride: otel-collector
  mode: deployment
  presets:
    kubernetesAttributes:
      enabled: true
  resources:
    limits:
      memory: 200Mi
  service:
    type: ClusterIP 